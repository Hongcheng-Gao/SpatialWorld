# CARLA autonomous driving environment configuration

# ==================== Environment ====================
env:
  type: carla
  host: null
  port: 2000
  timeout: 10.0

  # Sensor configuration
  sensors:
    rgb_camera:
      width: 800
      height: 600
      fov: 90

    depth_camera:
      enabled: false

    lidar:
      enabled: false

  # Weather configuration
  weather: ClearNoon # e.g. ClearNoon, CloudySunset, WetNoon, HardRainNoon

  # Map
  map: Town01

# ==================== Task Control ====================
max_steps: 100

# ==================== Context Management ====================
context_management:
  max_trajectory_length: 20
  enable_auto_truncation: true
  enable_long_term_summary: false # Enable long-term semantic summary (<SUMMARY> tag)
  short_term_history_window_size: 3 # Short-term multimodal history window size

# ==================== Model ====================
model:
  vlm:
    provider: openai
    model_name: gemini-2.5-pro
    temperature: 0.2
    max_tokens: 2000

# ==================== Logging ====================
logging:
  stdout_verbose: true
  save_step_images: true
  log_level: INFO

# ==================== Actions ====================
actions:
  # Throttle range
  throttle_range: [0.0, 1.0]
  # Steering range
  steer_range: [-1.0, 1.0]
  # Brake range
  brake_range: [0.0, 1.0]

# ==================== Rewards ====================
reward:
  success_reward: 10.0
  step_penalty: -0.01
  collision_penalty: -1.0
  lane_invasion_penalty: -0.5

# ==================== Experiment ====================
experiment:
  num_episodes: 1
  output_dir: outputs

# ==================== Task Presets ====================
task_presets:
  navigate_to_waypoint:
    description: Navigate to the specified waypoint safely along the road
    max_steps: 100
    map: Town01
    waypoint:
      x: 100.0
      y: 50.0
      z: 0.5
    success_condition:
      type: distance_to_waypoint
      threshold: 5.0 # success within 5 meters of the target

  follow_lane:
    description: Stay in the current lane at a stable speed and avoid lane departures
    max_steps: 200
    map: Town01
    target_speed: 30.0 # km/h
    success_condition:
      type: lane_following
      min_distance: 500.0 # drive at least 500 meters

  avoid_obstacles:
    description: Avoid obstacles and reach the target while watching for static and dynamic obstacles
    max_steps: 150
    map: Town02
    obstacle_count: 5
    waypoint:
      x: 150.0
      y: 80.0
      z: 0.5
    success_condition:
      type: distance_to_waypoint
      threshold: 5.0

  traffic_light_stop:
    description: Recognize traffic lights, stop on red, and proceed on green
    max_steps: 100
    map: Town03
    success_condition:
      type: traffic_light_compliance
      required_stops: 3 # correctly stop 3 times

  highway_merge:
    description: Merge safely onto the highway and keep a safe distance from other vehicles
    max_steps: 150
    map: Town04
    target_speed: 60.0 # km/h
    success_condition:
      type: highway_merge
      min_distance: 300.0
