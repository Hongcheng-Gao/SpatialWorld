# Full CARLA autonomous driving stack configuration

api:
  max_retries: 3

# ==================== Environment ====================
env:
  type: carla
  host: 127.0.0.1
  port: 2000
  timeout: 10.0

  # Sensors (vehicle + walker; matches scripts/carla/interact_*.py)
  sensors:
    rgb_camera:
      width: 800
      height: 600
      fov: 90
      attach:
        x: 1.5
        y: 0.0
        z: 2.4
        pitch: -10.0
        yaw: 0.0
        roll: 0.0
    rgb_camera_walker:
      width: 1280
      height: 720
      fov: 60
      attach:
        x: 0.0
        y: 0.0
        z: 1.7
        pitch: 0.0
        yaw: 0.0
        roll: 0.0

    depth_camera:
      enabled: false

    lidar:
      enabled: false

  # Weather: ClearNoon, CloudySunset, WetNoon, HardRainNoon, etc.
  weather: ClearNoon

  # Map
  map: Town01

# ==================== Task control ====================
max_steps: 100

# ==================== Context management ====================
context_management:
  max_trajectory_length: 20
  enable_auto_truncation: true
  enable_long_term_summary: false # Long-term semantic summary (<SUMMARY> tag)
  short_term_history_window_size: 29 # Recent N multimodal steps (images + errors)

# ==================== Model ====================
model:
  vlm:
    provider: openai
    model_name: GLM-4.6V
    temperature: 1.0
    top_p: 0.9
    max_tokens: 4096
    base_url: null
    api_key: null

# ==================== Logging ====================
logging:
  stdout_verbose: true
  save_step_images: true
  log_level: INFO

# ==================== Actions ====================
actions:
  throttle_range: [0.0, 1.0]
  steer_range: [-1.0, 1.0]
  brake_range: [0.0, 1.0]

# ==================== Reward ====================
reward:
  success_reward: 10.0
  step_penalty: -0.01
  collision_penalty: -1.0
  lane_invasion_penalty: -0.5

# ==================== Experiment ====================
experiment:
  num_episodes: 1
  output_dir: outputs

# ==================== Task presets ====================
task_presets:
  navigate_to_waypoint:
    description: Navigate to the specified waypoint along the road and reach it safely.
    max_steps: 100
    map: Town01
    waypoint:
      x: 100.0
      y: 50.0
      z: 0.5
    success_condition:
      type: distance_to_waypoint
      threshold: 5.0 # success within 5 m of the goal

  follow_lane:
    description: Stay in the current lane at a stable speed and avoid leaving the lane.
    max_steps: 200
    map: Town01
    target_speed: 30.0 # km/h
    success_condition:
      type: lane_following
      min_distance: 500.0 # drive at least 500 m

  avoid_obstacles:
    description: Reach the goal while avoiding obstacles; watch for static and dynamic objects ahead.
    max_steps: 150
    map: Town02
    obstacle_count: 5
    waypoint:
      x: 150.0
      y: 80.0
      z: 0.5
    success_condition:
      type: distance_to_waypoint
      threshold: 5.0

  traffic_light_stop:
    description: Obey traffic lights - stop on red and go on green.
    max_steps: 100
    map: Town03
    success_condition:
      type: traffic_light_compliance
      required_stops: 3 # must stop correctly 3 times

  highway_merge:
    description: Merge onto the highway safely and keep a safe distance from other vehicles.
    max_steps: 150
    map: Town04
    target_speed: 60.0 # km/h
    success_condition:
      type: highway_merge
      min_distance: 300.0

