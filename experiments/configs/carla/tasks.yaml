# CARLA 语义导航任务定义
# 聚焦于 Visual Grounding（视觉定位）和 Spatial Reasoning（空间推理）

tasks:
  # ============================================
  # 任务 1：基础路点导航
  # ============================================
  navigate_to_waypoint:
    description: |
      【导航任务】请驾驶车辆到达目标位置。
      目标坐标已在仪表盘显示，距离约 150 米。
      要求：安全驾驶，遵守交通规则，到达后停车。
    map: Town01
    max_steps: 30
    waypoint:
      x: 200.0
      y: 133.0
      z: 0.5
    success_condition:
      type: distance_to_waypoint
      threshold: 10.0

  # ============================================
  # ============================================
  visual_landmark_navigation:
    description: |
      【视觉导航任务】不依赖 GPS，根据视觉线索导航。
      提示：前方第二个路口右转，然后沿着红色建筑物的方向行驶。
      到达一个有加油站的路口后停车。
    map: Town03
    max_steps: 40
    success_condition:
      type: distance_to_waypoint
      threshold: 15.0
    waypoint:
      x: -60.0
      y: 130.0
      z: 0.5

  # ============================================
  # 任务 3：复杂指令交互（Complex Instruction Following）
  # ============================================
  complex_instruction:
    description: |
      【复杂指令任务】执行多步骤导航。
      1. 首先沿当前道路直行
      2. 在前方路口左转
      3. 继续行驶约 100 米
      4. 在看到停车标志的位置停车
      注意：保持安全车速，避免碰撞。
    map: Town02
    max_steps: 35
    waypoint:
      x: 150.0
      y: -50.0
      z: 0.5
    success_condition:
      type: distance_to_waypoint
      threshold: 10.0

  # ============================================
  # 任务 4：交通规则遵守
  # ============================================
  traffic_light_compliance:
    description: |
      【交通规则任务】模拟城市驾驶场景。
      要求：
      - 遇到红灯必须停车等待
      - 绿灯时正常通行
      - 黄灯时减速准备停车
      目标：安全通过 3 个路口后到达目标点。
    map: Town03
    max_steps: 50
    waypoint:
      x: 100.0
      y: 200.0
      z: 0.5
    success_condition:
      type: distance_to_waypoint
      threshold: 10.0

  # ============================================
  # 任务 5：车道保持测试
  # ============================================
  lane_following:
    description: |
      【车道保持任务】测试车道保持能力。
      要求：沿当前车道行驶至少 200 米，保持在车道中央。
      目标速度：30-40 km/h
      评价标准：车道偏离次数越少越好。
    map: Town04
    max_steps: 40
    success_condition:
      type: lane_following
      min_distance: 200.0
      max_invasions: 5

  # ============================================
  # 任务 6：紧急情况处理（Corner Case）
  # ============================================
  emergency_handling:
    description: |
      【紧急情况任务】测试应急反应能力。
      场景：前方可能有障碍物或突发情况。
      要求：
      - 保持警觉，观察前方道路
      - 发现障碍物时及时停车或绕行
      - 安全到达目标位置
    map: Town01
    max_steps: 30
    waypoint:
      x: 150.0
      y: 100.0
      z: 0.5
    success_condition:
      type: distance_to_waypoint
      threshold: 10.0

# ============================================
# 预设难度
# ============================================
difficulty_presets:
  easy:
    time_slice_seconds: 2.0  # 更长的执行时间
    max_steps: 50
    
  medium:
    time_slice_seconds: 1.5
    max_steps: 35
    
  hard:
    time_slice_seconds: 1.0  # 更短的执行时间，需要更频繁决策
    max_steps: 25
