# CARLA semantic navigation task definitions
# Focused on visual grounding and spatial reasoning

tasks:
  # ============================================
  # Task 1: Basic waypoint navigation
  # ============================================
  navigate_to_waypoint:
    description: |
      [Navigation] Drive the vehicle to the target location.
      The target coordinates are shown on the dashboard, about 150 meters away.
      Requirements: drive safely, follow traffic rules, and stop after arrival.
    map: Town01
    max_steps: 30
    waypoint:
      x: 200.0
      y: 133.0
      z: 0.5
    success_condition:
      type: distance_to_waypoint
      threshold: 10.0

  # ============================================
  # ============================================
  visual_landmark_navigation:
    description: |
      [Visual Navigation] Navigate without GPS using visual cues.
      Hint: turn right at the second intersection ahead, then follow the red building.
      Stop at the intersection with a gas station.
    map: Town03
    max_steps: 40
    success_condition:
      type: distance_to_waypoint
      threshold: 15.0
    waypoint:
      x: -60.0
      y: 130.0
      z: 0.5

  # ============================================
  # Task 3: Complex instruction following
  # ============================================
  complex_instruction:
    description: |
      [Complex Instruction] Execute a multi-step navigation plan.
      1. Continue straight along the current road
      2. Turn left at the next intersection
      3. Drive about 100 meters further
      4. Stop when you see a stop sign
      Note: maintain a safe speed and avoid collisions.
    map: Town02
    max_steps: 35
    waypoint:
      x: 150.0
      y: -50.0
      z: 0.5
    success_condition:
      type: distance_to_waypoint
      threshold: 10.0

  # ============================================
  # Task 4: Traffic rule compliance
  # ============================================
  traffic_light_compliance:
    description: |
      [Traffic Rules] Simulate an urban driving scenario.
      Requirements:
      - Stop and wait at red lights
      - Proceed normally at green lights
      - Slow down and prepare to stop at yellow lights
      Goal: safely pass 3 intersections and reach the target point.
    map: Town03
    max_steps: 50
    waypoint:
      x: 100.0
      y: 200.0
      z: 0.5
    success_condition:
      type: distance_to_waypoint
      threshold: 10.0

  # ============================================
  # Task 5: Lane keeping
  # ============================================
  lane_following:
    description: |
      [Lane Keeping] Test lane-keeping ability.
      Requirement: stay in the current lane for at least 200 meters and keep near the lane center.
      Target speed: 30-40 km/h
      Evaluation: fewer lane departures are better.
    map: Town04
    max_steps: 40
    success_condition:
      type: lane_following
      min_distance: 200.0
      max_invasions: 5

  # ============================================
  # Task 6: Emergency handling (corner case)
  # ============================================
  emergency_handling:
    description: |
      [Emergency Handling] Test emergency response ability.
      Scenario: there may be obstacles or unexpected events ahead.
      Requirements:
      - Stay alert and watch the road ahead
      - Stop or detour promptly when an obstacle appears
      - Reach the target location safely
    map: Town01
    max_steps: 30
    waypoint:
      x: 150.0
      y: 100.0
      z: 0.5
    success_condition:
      type: distance_to_waypoint
      threshold: 10.0

# ============================================
# Difficulty presets
# ============================================
difficulty_presets:
  easy:
    time_slice_seconds: 2.0  # Longer action execution window
    max_steps: 50
    
  medium:
    time_slice_seconds: 1.5
    max_steps: 35
    
  hard:
    time_slice_seconds: 1.0  # Shorter action window; requires more frequent decisions
    max_steps: 25
