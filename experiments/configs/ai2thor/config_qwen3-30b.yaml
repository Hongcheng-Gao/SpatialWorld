# =============================================================================
# =============================================================================
env:
  type: ai2thor
  agent_count: 1
  width: 800
  height: 600
  field_of_view: 60
  grid_size: 0.25
  render_depth: false
  render_instance_segmentation: false
  text_state_mode: first_person
  visibility_distance: 1.0
  platform: null

max_steps: 30

context_management:
  enable_long_term_summary: false
  short_term_history_window_size: 29

model:
  vlm:
    provider: openai
    model_name: Qwen3-VL-30B-A3B-Instruct
    temperature: 1.0
    top_p: 0.9
    max_tokens: 4096
    base_url: null
    api_key: null

logging:
  stdout_verbose: true
  save_step_images: true

actions:
  move_small_magnitude: 0.25
  move_medium_magnitude: 0.5
  move_large_magnitude: 1
  move_ahead_magnitude: 0.5
  move_back_magnitude: 0.5
  move_left_magnitude: 0.5
  move_right_magnitude: 0.5
  rotate_degrees: 90

reward:
  success_reward: 10.0
  step_success_bonus: 0.1
  step_failure_penalty: -0.05

experiment:
  num_episodes: 1
  output_dir: outputs

task_presets:
  open_fridge:
    scene: FloorPlan1
    description: You are now in a kitchen scene, please look around like a person to find the fridge, then walk to the front of the fridge, and finally try to open the fridge door.
    target_object_types: [Fridge]
    success_condition: {type: object_state, field: isOpen, value: true, any: true}
    target_description: Find and open any Fridge
  open_microwave:
    scene: FloorPlan1
    description: Find the microwave in the kitchen, walk to the front of it, and then open the microwave door.
    target_object_types: [Microwave]
    success_condition: {type: object_state, field: isOpen, value: true, any: true}
    target_description: Find and open any Microwave
  close_faucet:
    scene: FloorPlan1
    description: Find the open faucet in the kitchen, walk to the front of it, and then close it.
    target_object_types: [Faucet]
    success_condition: {type: object_state, field: isToggled, value: false, any: true}
    target_description: Find and close any open Faucet
  turn_on_light:
    scene: FloorPlan10
    description: Find the light switch in the room, walk to the front of it, and then turn on the light.
    target_object_types: [LightSwitch]
    success_condition: {type: object_state, field: isToggled, value: true, any: true}
    target_description: Find and turn on any LightSwitch
  pickup_egg:
    scene: FloorPlan2
    description: Find the egg (Egg), approach it, and then pick up the egg.
    target_object_types: [Egg]
    success_condition: {type: object_in_hand, object_type: Egg}
    target_description: Find and pick up the egg (Egg)
    max_steps: 25
  pickup_phone:
    scene: FloorPlan2
    description: Find the phone (Phone), approach it, and then pick up the phone.
    target_object_types: [Phone]
    success_condition: {type: object_in_hand, object_type: Phone}
    target_description: Find and pick up the phone (Phone)
    max_steps: 25
  put_egg_in_pan:
    scene: FloorPlan2
    description: Find the egg (Egg), pick it up, and then put it into the pan (Pan)
    target_object_types: [Egg, Pan]
    success_condition: {type: object_state, field: parentReceptacles, value: Pan, any: true}
    target_description: Find the egg (Egg), pick it up, and then put it into the pan (Pan)
    max_steps: 50
  slice_apple:
    scene: FloorPlan1
    description: Find the apple (Apple), slice it
    target_object_types: [Apple]
    success_condition: {type: object_state, field: isSliced, value: true, any: true}
    target_description: Find the apple (Apple), slice it
    max_steps: 60
  put_two_eggs_in_pan:
    scene: FloorPlan2
    description: Find two eggs and put them both into the pan
    target_object_types: [Egg, Pan]
    success_conditions:
      - type: object_in_receptacle
        object_type: Egg
        receptacle_type: Pan
        count: 2
        description: Two eggs must be in the pan
    success_logic: AND
    target_description: Find two eggs and put them both into the pan
    max_steps: 80
